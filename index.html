<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanzas Pro Multiuser</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50 font-sans leading-normal tracking-normal">

    <div id="welcome-screen" class="min-h-screen flex items-center justify-center p-4">
        <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl p-8 text-center">
            <div class="mb-6 inline-flex bg-blue-100 p-4 rounded-full text-blue-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-gray-800 mb-2">Bienvenido</h1>
            <p class="text-gray-500 mb-8">Ingresa tu usuario para gestionar tus finanzas y activos en tiempo real.</p>
            
            <div class="space-y-4 text-left">
                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase">Usuario</label>
                    <input type="text" id="user-id" placeholder="Ej: Admin" class="w-full mt-1 p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase">PIN de Acceso</label>
                    <input type="password" id="user-pin" placeholder="****" class="w-full mt-1 p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                </div>
                <button onclick="login()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-blue-700 transition active:scale-95">
                    INGRESAR A MI APP
                </button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden min-h-screen pb-10">
        
        <nav class="bg-white border-b p-4 flex justify-between items-center sticky top-0 z-50">
            <span class="font-bold text-gray-700">Hola, <span id="display-user" class="text-blue-600">User</span></span>
            <button onclick="logout()" class="text-xs bg-gray-100 text-gray-500 px-3 py-1 rounded-full font-bold">CERRAR SESIÓN</button>
        </nav>

        <div class="p-4 space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                    <p class="text-xs text-gray-400 font-bold uppercase">Ingresos</p>
                    <p id="dash-ingresos" class="text-xl font-bold text-green-500">$0</p>
                </div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                    <p class="text-xs text-gray-400 font-bold uppercase">Gastos</p>
                    <p id="dash-gastos" class="text-xl font-bold text-red-400">$0</p>
                </div>
            </div>

            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="text-sm font-bold text-gray-700 mb-4 uppercase">Activos en Tiempo Real (Yahoo/Google Finance)</h2>
                <canvas id="investmentsChart" height="200"></canvas>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-md border-t-4 border-blue-600">
                <h2 class="font-bold text-gray-800 mb-4">Nueva Operación</h2>
                <form id="finance-form" class="space-y-4">
                    <input type="hidden" name="Usuario" id="hidden-user">
                    <input type="date" id="Fecha" name="Fecha" class="w-full p-3 bg-gray-50 border rounded-xl" required>
                    <input type="text" name="Concepto" placeholder="Detalle (Ej: Guardia)" class="w-full p-3 bg-gray-50 border rounded-xl" required>
                    <select id="Categoria" name="Categoria" class="w-full p-3 bg-gray-50 border rounded-xl" required>
                        <option value="Guardia">Ingreso: Guardia</option>
                        <option value="Alquiler">Necesidad: Alquiler/Expensas</option>
                        <option value="Supermercado">Necesidad: Supermercado</option>
                        <option value="Salidas">Deseo: Salidas</option>
                        <option value="Inversión">Ahorro: Activo Bolsa</option>
                    </select>
                    <input type="number" name="Monto" step="0.01" placeholder="Monto $" class="w-full p-3 bg-gray-50 border rounded-xl text-xl font-bold text-blue-600" required>
                    <button type="submit" id="btn-save" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-md hover:bg-blue-700 transition">
                        GUARDAR MOVIMIENTO
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://api.sheetbest.com/sheets/c69df2de-cb38-4d8b-b942-7616b4683eeb';
        let currentUser = "";

        // Lógica de Login Multiusuario
        function login() {
            const user = document.getElementById('user-id').value;
            const pin = document.getElementById('user-pin').value;

            if (user.length > 2 && pin === "1234") { // Cambia el PIN por el que quieras
                currentUser = user;
                document.getElementById('hidden-user').value = user;
                document.getElementById('display-user').innerText = user;
                document.getElementById('welcome-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                loadDashboard();
            } else {
                alert("Usuario o PIN inválido");
            }
        }

        function logout() {
            location.reload();
        }

        // Cargar Balances e Inversiones en tiempo real
        async function loadDashboard() {
            try {
                // 1. Cargar Balance (Pestaña Balance)
                const resBal = await fetch(`${API_BASE}/tabs/Balance`);
                const dataBal = await resBal.json();
                document.getElementById('dash-ingresos').innerText = `$${dataBal[0].Monto}`;
                document.getElementById('dash-gastos').innerText = `$${dataBal[1].Monto}`;

                // 2. Cargar Inversiones (Pestaña Inversiones_Ahorro)
                const resInv = await fetch(`${API_BASE}/tabs/Inversiones_Ahorro`);
                const dataInv = await resInv.json();
                
                renderChart(dataInv);
            } catch (e) { console.error("Error cargando dashboard", e); }
        }

            const ctx = document.getElementById('investmentsChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels
