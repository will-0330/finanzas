<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>App Financiera Segura</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div id="login-screen" class="max-w-md mx-auto bg-white p-6 rounded-xl shadow-md">
        <h2 class="text-xl font-bold mb-4">Acceso Seguro</h2>
        <input type="password" id="pass" placeholder="Ingresa tu clave" class="w-full p-2 border rounded mb-4">
        <button onclick="checkLogin()" class="w-full bg-green-600 text-white p-2 rounded">Ingresar</button>
    </div>

    <div id="app-screen" class="hidden max-w-md mx-auto bg-white p-6 rounded-xl shadow-md">
        <h1 class="text-xl font-bold mb-4">Balance Mensual</h1>
        <div id="balance" class="bg-blue-50 p-4 rounded mb-6 text-center text-lg font-bold">
            Cargando balance...
        </div>
        </div>

    <script>
        function checkLogin() {
            const pass = document.getElementById('pass').value;
            // CAMBIA "1234" por tu clave secreta
            if(pass === "1234") { 
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                loadBalance();
            } else { alert("Clave incorrecta"); }
        }

        async function loadBalance() {
            // Esta URL debería apuntar a la nueva pestaña "Balance" de tu Sheets
            const url = 'https://api.sheetbest.com/sheets/c69df2de-cb38-4d8b-b942-7616b4683eeb/tabs/Balance';
            const res = await fetch(url);
            const data = await res.json();
            document.getElementById('balance').innerText = `Ingresos: ${data[0].Total} | Gastos: ${data[1].Total}`;
        }
    </script>
</body>
</html>
