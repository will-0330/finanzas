<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harmony Finanzas v12</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { brand: { blue: '#1e3a8a', green: '#10b981', bg: '#f0fdf4' } } } }
        }
    </script>
    <style>
        .chart-container { position: relative; height:220px; width:100%; }
        body { -webkit-tap-highlight-color: transparent; background-color: #f0fdf4; }
    </style>
</head>
<body class="font-sans text-slate-800 pb-20">

    <div id="auth-screen" class="min-h-screen flex items-center justify-center p-6 bg-white">
        <div class="max-w-md w-full text-center">
            <h1 class="text-4xl font-extrabold text-brand-blue mb-2">Harmony</h1>
            <div class="space-y-4 text-left bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100 mt-6">
                <input type="text" id="user-input" placeholder="Usuario" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none">
                <input type="password" id="pass-input" placeholder="PIN" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none">
                <button onclick="handleAuth()" class="w-full bg-brand-blue text-white font-bold py-4 rounded-2xl">INGRESAR</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden min-h-screen">
        <header class="bg-white border-b p-5 flex justify-between items-center sticky top-0 z-50">
            <h2 class="font-bold text-lg">Hola, <span id="user-logged" class="text-brand-blue"></span></h2>
            <button onclick="logout()" class="text-xs font-bold text-red-500">Cerrar Sesión</button>
        </header>

        <main class="max-w-6xl mx-auto p-5 space-y-8">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="bg-white p-6 rounded-[2rem] shadow-sm">
                    <h3 class="text-xs font-bold text-slate-400 mb-4">BALANCE 50/30/20</h3>
                    <div class="chart-container"><canvas id="pilarChart"></canvas></div>
                </div>
                <div class="bg-white p-6 rounded-[2rem] shadow-sm">
                    <h3 class="text-xs font-bold text-slate-400 mb-4">MIS ACTIVOS</h3>
                    <div class="chart-container"><canvas id="assetsChart"></canvas></div>
                </div>
            </div>

            <div class="bg-white p-8 rounded-[2.5rem] shadow-lg border-l-4 border-brand-green">
                <h3 class="font-extrabold text-2xl mb-6">Nuevo Registro</h3>
                <form id="finance-form" onsubmit="saveData(event)" class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="date" id="Fecha" name="Fecha" class="p-4 bg-slate-50 rounded-xl border" required>
                        <input type="number" name="Monto" step="0.01" placeholder="$ Monto" class="p-4 bg-slate-50 rounded-xl border font-bold text-brand-green" required>
                    </div>
                    <input type="text" name="Concepto" placeholder="Detalle" class="w-full p-4 bg-slate-50 rounded-xl border" required>
                    <select id="Categoria" name="Categoria" class="w-full p-4 bg-slate-50 rounded-xl border" required>
                        <option value="Guardia">💰 Ingreso: Guardia</option>
                        <option value="Alquiler">🏠 Necesidad: Alquiler</option>
                        <option value="Supermercado">🛒 Necesidad: Super</option>
                        <option value="Salidas">🍷 Deseo: Ocio</option>
                        <option value="Inversión">📈 Ahorro: Inversión</option>
                    </select>
                    <button type="submit" id="submit-btn" class="w-full bg-brand-blue text-white font-bold py-4 rounded-xl shadow-lg">GUARDAR EN DRIVE</button>
                </form>
                <p id="status-msg" class="text-center mt-4 font-bold text-brand-green hidden">✅ ¡Guardado con éxito!</p>
            </div>
        </main>
    </div>

    <script>
        const API_URL = 'https://api.sheetbest.com/sheets/c69df2de-cb38-4d8b-b942-7616b4683eeb';
        let currentUser = "";
        let charts = {};

        function handleAuth() {
            const user = document.getElementById('user-input').value.trim();
            const pin = document.getElementById('pass-input').value.trim();
            if(user && pin) { 
                localStorage.setItem('harmony_user', user);
                startApp(user); 
            }
        }

        function startApp(user) {
            currentUser = user;
            document.getElementById('user-logged').innerText = user;
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('Fecha').valueAsDate = new Date();
            loadCharts();
        }

        async function loadCharts() {
            try {
                const [rBal, rInv] = await Promise.all([
                    fetch(`${API_URL}/tabs/Balance`),
                    fetch(`${API_URL}/tabs/Inversiones_Ahorro`)
                ]);
                const dBal = await rBal.json();
                const dInv = await rInv.json();

                if(charts.p) charts.p.destroy();
                charts.p = new Chart(document.getElementById('pilarChart'), {
                    type: 'doughnut',
                    data: { labels: dBal.map(x => x.Pilar), datasets: [{ data: dBal.map(x => x.Monto), backgroundColor: ['#1e3a8a','#4f46e5','#10b981'] }] }
                });

                if(charts.a) charts.a.destroy();
                charts.a = new Chart(document.getElementById('assetsChart'), {
                    type: 'pie',
                    data: { labels: dInv.map(x => x.Activo), datasets: [{ data: dInv.map(x => x.Valor_Total_ARS), backgroundColor: ['#059669','#10b981','#34d399','#6ee7b7'] }] }
                });
            } catch(e) { console.log("Error cargando gráficos"); }
        }

        async function saveData(e) {
            e.preventDefault();
            e.stopPropagation(); // BLOQUEA LA RECARGA DE PÁGINA
            
            const btn = document.getElementById('submit-btn');
            const status = document.getElementById('status-msg');
            btn.disabled = true;
            btn.innerText = "ENVIANDO...";

            const form = document.getElementById('finance-form');
            const formData = new FormData(form);
            const rawData = Object.fromEntries(formData);
            
            // Asignación de pilar
            let pilar = "Ahorro/Inversion (20%)";
            if (rawData.Categoria === "Guardia") pilar = "Ingreso";
            else if (["Alquiler", "Supermercado"].includes(rawData.Categoria)) pilar = "Necesidades (50%)";
            else if (rawData.Categoria === "Salidas") pilar = "Deseos (30%)";

            const dataToSend = [{
                ...rawData,
                Pilar_Regla: pilar,
                Usuario: currentUser,
                Fecha: rawData.Fecha // Formato YYYY-MM-DD
            }];

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dataToSend)
                });

                if(response.ok) {
                    status.classList.remove('hidden');
                    form.reset();
                    document.getElementById('Fecha').valueAsDate = new Date();
                    await loadCharts();
                    setTimeout(() => status.classList.add('hidden'), 3000);
                } else {
                    alert("Error en el servidor de Google Sheets");
                }
            } catch (err) {
                alert("Error de conexión. Revisa tu internet.");
            } finally {
                btn.disabled = false;
                btn.innerText = "GUARDAR EN DRIVE";
            }
            return false;
        }

        function logout() {
            localStorage.removeItem('harmony_user');
            location.reload();
        }

        // Auto-login si ya existe el usuario
        window.onload = () => {
            const saved = localStorage.getItem('harmony_user');
            if(saved) startApp(saved);
        }
    </script>
</body>
</html>
