<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harmony Finanzas v13</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { brand: { blue: '#1e3a8a', green: '#10b981', bg: '#f0fdf4' } } } }
        }
    </script>
</head>
<body class="bg-brand-bg font-sans text-slate-800 pb-20">

    <div id="auth-screen" class="min-h-screen flex items-center justify-center p-6 bg-white">
        <div class="max-w-md w-full text-center">
            <h1 class="text-4xl font-extrabold text-brand-blue mb-8">Harmony</h1>
            <div class="space-y-4 bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100">
                <input type="text" id="user-input" placeholder="Usuario" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none">
                <input type="password" id="pass-input" placeholder="PIN" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none">
                <button onclick="handleAuth()" class="w-full bg-brand-blue text-white font-bold py-4 rounded-2xl hover:bg-black transition">INGRESAR</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden min-h-screen">
        <header class="bg-white border-b p-5 flex justify-between items-center sticky top-0 z-50">
            <h2 class="font-bold text-lg">Hola, <span id="user-logged" class="text-brand-blue"></span></h2>
            <button onclick="logout()" class="text-xs font-bold text-red-500 bg-red-50 px-3 py-1 rounded-full">Salir</button>
        </header>

        <main class="max-w-4xl mx-auto p-5 space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-white p-6 rounded-[2rem] shadow-sm text-center">
                    <h3 class="text-[10px] font-bold text-slate-400 mb-4 tracking-tighter">BALANCE 50/30/20</h3>
                    <canvas id="pilarChart" height="200"></canvas>
                </div>
                <div class="bg-white p-6 rounded-[2rem] shadow-sm text-center">
                    <h3 class="text-[10px] font-bold text-slate-400 mb-4 tracking-tighter">MIS ACTIVOS</h3>
                    <canvas id="assetsChart" height="200"></canvas>
                </div>
            </div>

            <div class="bg-white p-8 rounded-[2.5rem] shadow-lg border-l-8 border-brand-green">
                <h3 class="font-black text-2xl mb-8 text-slate-900">Nuevo Registro</h3>
                <div class="space-y-5">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-slate-400 ml-2">FECHA</label>
                            <input type="date" id="reg-fecha" class="w-full p-4 bg-slate-50 rounded-2xl border-none ring-1 ring-slate-100 outline-none focus:ring-2 focus:ring-brand-green">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-slate-400 ml-2">MONTO ARS</label>
                            <input type="number" id="reg-monto" placeholder="0.00" class="w-full p-4 bg-slate-50 rounded-2xl border-none ring-1 ring-slate-100 outline-none focus:ring-2 focus:ring-brand-green font-bold text-brand-green">
                        </div>
                    </div>
                    
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-400 ml-2">DETALLE / CONCEPTO</label>
                        <input type="text" id="reg-concepto" placeholder="Ej: Guardia o Super" class="w-full p-4 bg-slate-50 rounded-2xl border-none ring-1 ring-slate-100 outline-none focus:ring-2 focus:ring-brand-green">
                    </div>

                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-400 ml-2">CATEGORÍA</label>
                        <select id="reg-categoria" class="w-full p-4 bg-slate-50 rounded-2xl border-none ring-1 ring-slate-100 outline-none focus:ring-2 focus:ring-brand-green">
                            <option value="Guardia">💰 Ingreso: Guardia</option>
                            <option value="Alquiler">🏠 Necesidad: Alquiler</option>
                            <option value="Supermercado">🛒 Necesidad: Super</option>
                            <option value="Salidas">🍷 Deseo: Ocio</option>
                            <option value="Inversión">📈 Ahorro: Inversión</option>
                        </select>
                    </div>

                    <button onclick="enviarDatosDirecto()" id="btn-save" class="w-full bg-brand-blue text-white font-black py-5 rounded-2xl shadow-xl hover:bg-black transition-all active:scale-95 mt-4">
                        SINCRONIZAR CON DRIVE
                    </button>
                </div>
            </div>

            <div id="debug-log" class="text-[10px] font-mono text-slate-400 text-center uppercase tracking-widest">
                Sistema listo para operar
            </div>
        </main>
    </div>

    <script>
        const API_URL = 'https://api.sheetbest.com/sheets/c69df2de-cb38-4d8b-b942-7616b4683eeb';
        let currentUser = "";
        let charts = {};

        function handleAuth() {
            const user = document.getElementById('user-input').value.trim();
            if(user) { 
                localStorage.setItem('harmony_user', user);
                startApp(user); 
            }
        }

        function startApp(user) {
            currentUser = user;
            document.getElementById('user-logged').innerText = user;
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('reg-fecha').valueAsDate = new Date();
            loadCharts();
        }

        async function loadCharts() {
            try {
                const [rBal, rInv] = await Promise.all([
                    fetch(`${API_URL}/tabs/Balance`),
                    fetch(`${API_URL}/tabs/Inversiones_Ahorro`)
                ]);
                const dBal = await rBal.json();
                const dInv = await rInv.json();

                if(charts.p) charts.p.destroy();
                charts.p = new Chart(document.getElementById('pilarChart'), {
                    type: 'doughnut',
                    data: { labels: dBal.map(x => x.Pilar), datasets: [{ data: dBal.map(x => x.Monto), backgroundColor: ['#1e3a8a','#4f46e5','#10b981'], borderWidth:0 }] },
                    options: { plugins: { legend: { position: 'bottom', labels: { boxWidth: 8, font: { size: 10 } } } } }
                });

                if(charts.a) charts.a.destroy();
                charts.a = new Chart(document.getElementById('assetsChart'), {
                    type: 'pie',
                    data: { labels: dInv.map(x => x.Activo), datasets: [{ data: dInv.map(x => x.Valor_Total_ARS), backgroundColor: ['#059669','#10b981','#34d399','#6ee7b7'], borderWidth:0 }] },
                    options: { plugins: { legend: { position: 'bottom', labels: { boxWidth: 8, font: { size: 10 } } } } }
                });
            } catch(e) { document.getElementById('debug-log').innerText = "Error cargando gráficos de Drive"; }
        }

        async function enviarDatosDirecto() {
            const btn = document.getElementById('btn-save');
            const log = document.getElementById('debug-log');
            
            // Captura manual de valores
            const fecha = document.getElementById('reg-fecha').value;
            const monto = document.getElementById('reg-monto').value;
            const concepto = document.getElementById('reg-concepto').value;
            const categoria = document.getElementById('reg-categoria').value;

            if(!monto || !concepto) return alert("Por favor completa monto y detalle");

            btn.disabled = true;
            btn.innerText = "CONECTANDO...";
            log.innerText = "Iniciando transferencia segura...";

            // Lógica de Pilar
            let pilar = "Ahorro/Inversion (20%)";
            if (categoria === "Guardia") pilar = "Ingreso";
            else if (["Alquiler", "Supermercado"].includes(categoria)) pilar = "Necesidades (50%)";
            else if (categoria === "Salidas") pilar = "Deseos (30%)";

            const payload = [{
                Fecha: fecha,
                Monto: monto,
                Concepto: concepto,
                Categoria: categoria,
                Pilar_Regla: pilar,
                Usuario: currentUser,
                ID: Date.now() // ID único basado en tiempo
            }];

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if(res.ok) {
                    log.innerText = "¡Sincronización exitosa con Drive!";
                    log.className = "text-[10px] font-mono text-brand-green text-center uppercase tracking-widest";
                    
                    // Limpiar campos
                    document.getElementById('reg-monto').value = "";
                    document.getElementById('reg-concepto').value = "";
                    
                    // Actualizar gráficos
                    await loadCharts();
                } else {
                    log.innerText = "Error: El servidor de Drive no respondió";
                    alert("Error en la conexión. Verifica tu API de Sheet Best.");
                }
            } catch (err) {
                log.innerText = "Error de red: Sin internet o API bloqueada";
                alert("Fallo de red.");
            } finally {
                btn.disabled = false;
                btn.innerText = "SINCRONIZAR CON DRIVE";
                setTimeout(() => {
                    log.className = "text-[10px] font-mono text-slate-400 text-center uppercase tracking-widest";
                    log.innerText = "Sistema listo para operar";
                }, 4000);
            }
        }

        function logout() {
            localStorage.removeItem('harmony_user');
            location.reload();
        }

        window.onload = () => {
            const saved = localStorage.getItem('harmony_user');
            if(saved) startApp(saved);
        }
    </script>
</body>
</html>
