<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanzas Harmony Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-[#f8fafc] font-sans text-slate-800">

    <div id="auth-screen" class="min-h-screen flex items-center justify-center p-4">
        <div class="max-w-md w-full bg-white rounded-[2rem] shadow-xl p-8 border border-slate-100">
            <div class="text-center mb-8">
                <div class="inline-block p-4 bg-indigo-50 rounded-2xl text-indigo-600 mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A10.003 10.003 0 0012 21a10.003 10.003 0 008.384-4.562l.054.09m-9.928-1.492A10.002 10.002 0 0112 3c1.259 0 2.45.231 3.544.65M8.557 16.761l.548.172m10.138-2.171l.145.343" />
                    </svg>
                </div>
                <h1 id="auth-title" class="text-2xl font-bold text-slate-900">Bienvenido de nuevo</h1>
                <p id="auth-subtitle" class="text-slate-500 text-sm">Ingresa tus credenciales para continuar</p>
            </div>

            <div class="space-y-4">
                <input type="text" id="user-input" placeholder="Nombre de usuario" class="w-full p-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                <input type="password" id="pass-input" placeholder="PIN o Contraseña" class="w-full p-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                
                <button onclick="handleAuth()" id="auth-btn" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-lg shadow-indigo-200 hover:bg-indigo-700 transition-all active:scale-95">
                    INGRESAR
                </button>

                <div class="text-center pt-4">
                    <button onclick="toggleAuthMode()" id="toggle-btn" class="text-sm font-semibold text-indigo-600 hover:text-indigo-800">
                        ¿No tienes cuenta? Regístrate aquí
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden min-h-screen">
        <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-100 p-4 flex justify-between items-center">
            <h2 class="font-bold text-slate-900">Hola, <span id="user-logged" class="text-indigo-600">Admin</span></h2>
            <button onclick="location.reload()" class="p-2 bg-slate-100 rounded-xl text-slate-500 hover:text-red-500">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M3 3a1 1 0 00-1 1v12a1 1 0 102 0V4a1 1 0 00-1-1zm10.293 9.293a1 1 0 001.414 1.414l3-3a1 1 0 000-1.414l-3-3a1 1 0 10-1.414 1.414L14.586 9H7a1 1 0 100 2h7.586l-1.293 1.293z" clip-rule="evenodd" />
                </svg>
            </button>
        </header>

        <main class="max-w-4xl mx-auto p-4 space-y-6">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Regla 50/30/20</h3>
                    <div class="flex justify-center">
                        <canvas id="pilarChart" width="200" height="200"></canvas>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Cartera de Activos</h3>
                    <div class="flex justify-center">
                        <canvas id="assetsChart" width="200" height="200"></canvas>
                    </div>
                </div>
            </div>

            <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100">
                <h3 class="font-bold text-lg mb-6">Nuevo Registro</h3>
                <form id="finance-form" class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="date" id="Fecha" name="Fecha" class="p-4 bg-slate-50 border-none rounded-2xl outline-none" required>
                        <input type="number" name="Monto" step="0.01" placeholder="Monto $" class="p-4 bg-slate-50 border-none rounded-2xl outline-none font-bold text-indigo-600" required>
                    </div>
                    <input type="text" name="Concepto" placeholder="Detalle (ej: Guardia Hospital)" class="w-full p-4 bg-slate-50 border-none rounded-2xl outline-none" required>
                    <select id="Categoria" name="Categoria" class="w-full p-4 bg-slate-50 border-none rounded-2xl outline-none" required>
                        <option value="Guardia">💰 Ingreso: Guardia</option>
                        <option value="Alquiler">🏠 Necesidad: Alquiler / Vivienda</option>
                        <option value="Supermercado">🛒 Necesidad: Supermercado</option>
                        <option value="Salidas">🍷 Deseo: Salidas y Ocio</option>
                        <option value="Inversión">📈 Ahorro: Compra Activo</option>
                    </select>
                    <button type="submit" id="submit-btn" class="w-full bg-slate-900 text-white font-bold py-5 rounded-2xl shadow-xl hover:bg-black transition-all">
                        CONFIRMAR REGISTRO
                    </button>
                </form>
            </div>
        </main>
    </div>

    <script>
        const API_URL = 'https://api.sheetbest.com/sheets/c69df2de-cb38-4d8b-b942-7616b4683eeb';
        let isLoginMode = true;
        let currentUser = "";

        // LÓGICA DE USUARIOS (REGISTRO Y LOGIN)
        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? "Bienvenido de nuevo" : "Crea tu cuenta";
            document.getElementById('auth-subtitle').innerText = isLoginMode ? "Ingresa tus credenciales para continuar" : "Define tu usuario y PIN de acceso";
            document.getElementById('auth-btn').innerText = isLoginMode ? "INGRESAR" : "REGISTRARME";
            document.getElementById('toggle-btn').innerText = isLoginMode ? "¿No tienes cuenta? Regístrate aquí" : "¿Ya tienes cuenta? Inicia sesión";
        }

        function handleAuth() {
            const user = document.getElementById('user-input').value.trim();
            const pin = document.getElementById('pass-input').value.trim();

            if (!user || !pin) return alert("Completa todos los campos");

            let users = JSON.parse(localStorage.getItem('app_users') || '{}');

            if (isLoginMode) {
                if (users[user] && users[user] === pin) {
                    startApp(user);
                } else {
                    alert("Usuario o PIN incorrectos");
                }
            } else {
                if (users[user]) return alert("Este usuario ya existe");
                users[user] = pin;
                localStorage.setItem('app_users', JSON.stringify(users));
                alert("¡Registro exitoso! Ahora puedes iniciar sesión.");
                toggleAuthMode();
            }
        }

        function startApp(user) {
            currentUser = user;
            document.getElementById('user-logged').innerText = user;
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('Fecha').valueAsDate = new Date();
            loadCharts();
        }

        // CARGA DE GRÁFICOS DE TORTA (PIE CHARTS)
        async function loadCharts() {
            try {
                // Balance 50/30/20
                const resBal = await fetch(`${API_URL}/tabs/Balance`);
                const bal = await resBal.json();
                
                new Chart(document.getElementById('pilarChart'), {
                    type: 'doughnut',
                    data: {
                        labels: ['Necesidades', 'Deseos', 'Ahorro'],
                        datasets: [{
                            data: [bal[0].Monto || 0, bal[1].Monto || 0, 5000], // Ejemplo con valor fijo para ahorro si el balance está vacío
                            backgroundColor: ['#6366f1', '#f43f5e', '#10b981'],
                            borderWidth: 0
                        }]
                    },
                    options: { cutout: '70%', plugins: { legend: { position: 'bottom' } } }
                });

                // Activos en tiempo real
                const resInv = await fetch(`${API_URL}/tabs/Inversiones_Ahorro`);
                const inv = await resInv.json();

                new Chart(document.getElementById('assetsChart'), {
                    type: 'pie',
                    data: {
                        labels: inv.map(i => i.Activo),
                        datasets: [{
                            data: inv.map(i => parseFloat(i.Valor_Total_ARS) || 0),
                            backgroundColor: ['#4f46e5', '#818cf8', '#c7d2fe', '#e0e7ff', '#1e293b'],
                            borderWidth: 0
                        }]
                    },
                    options: { plugins: { legend: { position: 'bottom' } } }
                });
            } catch (e) { console.error("Error cargando gráficos", e); }
        }

        // GUARDAR MOVIMIENTO
        document.getElementById('finance-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerText = "Sincronizando...";

            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            
            // Asignación de pilar automática
            if (data.Categoria === "Guardia") data.Pilar_Regla = "Ingreso";
            else if (["Alquiler", "Supermercado"].includes(data.Categoria)) data.Pilar_Regla = "Necesidades (50%)";
            else if (data.Categoria === "Salidas") data.Pilar_Regla = "Deseos (30%)";
            else data.Pilar_Regla = "Ahorro/Inversion (20%)";
            
            data.Usuario = currentUser;

            try {
                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                alert("Movimiento registrado en la nube");
                e.target.reset();
                document.getElementById('Fecha').valueAsDate = new Date();
                location.reload(); // Recarga para actualizar gráficos
            } catch (err) { alert("Error de red"); }
        });
    </script>
</body>
</html>
