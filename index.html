<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Control Financiero</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-gray-100 p-4 font-sans">
    <div class="max-w-md mx-auto bg-white rounded-2xl shadow-lg overflow-hidden p-6 mt-4">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center border-b pb-4">Registrar Gasto/Ingreso</h1>
        
        <form id="finance-form" class="space-y-5">
            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider">Fecha</label>
                <input type="date" id="Fecha" name="Fecha" class="mt-1 block w-full border-gray-200 rounded-lg shadow-sm p-3 bg-gray-50 focus:ring-blue-500 focus:border-blue-500" required>
            </div>

            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider">Concepto / Detalle</label>
                <input type="text" name="Concepto" placeholder="Ej: Guardia Cetrángolo o Super" class="mt-1 block w-full border-gray-200 rounded-lg shadow-sm p-3 bg-gray-50 focus:ring-blue-500 focus:border-blue-500" required>
            </div>

            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider">Categoría</label>
                <select id="Categoria" name="Categoria" class="mt-1 block w-full border-gray-200 rounded-lg shadow-sm p-3 bg-gray-50 focus:ring-blue-500 focus:border-blue-500" required>
                    <optgroup label="--- INGRESOS ---">
                        <option value="Guardia">Guardia</option>
                        <option value="Trabajo Cetrangolo">Trabajo Cetrángolo</option>
                    </optgroup>
                    <optgroup label="--- GASTOS FIJOS (50%) ---">
                        <option value="Alquiler">Alquiler / Expensas</option>
                        <option value="Luz/Gas/Internet">Luz / Gas / Internet</option>
                        <option value="Impuestos">Monotributo / Impuestos</option>
                        <option value="Salud">Col. Médico / Caja Médica</option>
                        <option value="Supermercado">Supermercado</option>
                        <option value="Transporte">Transporte / Nafta</option>
                    </optgroup>
                    <optgroup label="--- VARIABLE (30%) ---">
                        <option value="Salidas">Salidas / Cenas</option>
                        <option value="Extras">Gastos Extras</option>
                    </optgroup>
                    <optgroup label="--- INVERSIÓN (20%) ---">
                        <option value="Inversión">Activos (Acciones/Bonos)</option>
                        <option value="Metroterra">Metroterra</option>
                    </optgroup>
                </select>
            </div>

            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider">Monto ($)</label>
                <input type="number" name="Monto" step="0.01" class="mt-1 block w-full border-gray-200 rounded-lg shadow-sm p-3 bg-gray-50 text-2xl font-bold text-blue-600 focus:ring-blue-500" placeholder="0.00" required>
            </div>

            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider">Cuenta</label>
                <select name="Cuenta" class="mt-1 block w-full border-gray-200 rounded-lg shadow-sm p-3 bg-gray-50">
                    <option value="Banco">Banco</option>
                    <option value="Efectivo">Efectivo</option>
                    <option value="Billetera Virtual">Billetera Virtual</option>
                </select>
            </div>

            <button type="submit" id="submit-btn" class="w-full bg-blue-600 text-white font-bold py-4 px-4 rounded-xl shadow-lg hover:bg-blue-700 active:transform active:scale-95 transition-all duration-150">
                GUARDAR EN MI APP
            </button>
        </form>
        
        <p id="status" class="mt-4 text-center text-sm font-medium hidden"></p>
    </div>

    <script>
        // Setea la fecha de hoy por defecto
        document.getElementById('Fecha').valueAsDate = new Date();

        const form = document.getElementById('finance-form');
        const btn = document.getElementById('submit-btn');
        const status = document.getElementById('status');

            e.preventDefault();

            btn.disabled = true;
